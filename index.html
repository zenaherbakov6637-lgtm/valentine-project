            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .heart-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            z-index: 2;
            pointer-events: none;
        }

        #heartCanvas {
            width: 100%;
            height: 100%;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 750px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            margin-bottom: 20px;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px #0f0; }
            50% { text-shadow: 0 0 20px #0f0, 0 0 30px #f0f; }
        }

        .title {
            font-size: 2em;
            margin-bottom: 10px;
            color: #0f0;
        }

        .timer {
            font-size: 2.5em;
            color: #f00;
            margin: 15px 0;
            animation: blink 1s infinite;
            text-shadow: 0 0 20px #f00;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .terminal {
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 25px;
            margin: 15px 0;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
        }

        #terminalOutput {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            text-align: left;
        }

        .message {
            margin: 8px 0;
            padding: 8px;
            border-radius: 5px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.info { color: #0ff; background: rgba(0, 255, 255, 0.1); }
        .message.success { color: #0f0; background: rgba(0, 255, 0, 0.1); }
        .message.error { color: #f00; background: rgba(255, 0, 0, 0.1); }
        .message.hint { color: #ff0; background: rgba(255, 255, 0, 0.1); }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: #111;
            border: 2px solid #0f0;
            border-radius: 12px;
            overflow: hidden;
            margin: 15px 0;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0f0, #0ff);
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px #0f0;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 5px #000;
        }

        .level-indicator {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .level-dot {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #222;
            border: 2px solid #0f0;

        }

        .level-dot.active {
            background: #0f0;
            box-shadow: 0 0 15px #0f0;
            transform: scale(1.2);
        }

        .level-dot.completed {
            background: #0ff;
            box-shadow: 0 0 15px #0ff;
        }

            border-radius: 25px;
            color: #0f0;
            text-align: center;

        .btn-group {

            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            font-weight: bold;

        .flower { position: relative; width: 100%; height: 100%; }

            position: absolute;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #f69, #f19);
            border-radius: 50% 50% 0 50%;
            transform-origin: bottom right;

            box-shadow: 0 0 25px rgba(255, 105, 180, 0.6);

            left: 50%;

                '💡 Это чувство, которое ты испытываешь',
                '💡 Оно бьётся в груди',
                '💡 Символ: ❤️ или слово из 6-7 букв'
            ],
            3: [
                '💡 Это обращение к одному человеку',
                '💡 Местоимение или комплимент',
                '💡 Короткое слово или прилагательное'
            ],
            4: [
                '💡 Подтверждение согласия',
                '💡 Ответ на важный вопрос',
                '💡 "Да", "Навсегда", "Вечно" или "💐"'
            ]
        };

        const levelMessages = {
            1: ['> УРОВЕНЬ 1: ОБНАРУЖЕН БРАНДМАУЭР', '> ОБХОД БОТАНИЧЕСКОЙ ЗАЩИТЫ...', '> ВВЕДИТЕ КОД НА РАСТИТЕЛЬНОЙ ОСНОВЕ'],
            2: ['> УРОВЕНЬ 2: ЭМОЦИОНАЛЬНОЕ ШИФРОВАНИЕ', '> РАСШИФРОВКА ЧУВСТВ...', '> ВВЕДИТЕ ЭМОЦИОНАЛЬНЫЙ КОД'],
            3: ['> УРОВЕНЬ 3: ПРОТОКОЛ СЕРДЦА', '> ДОСТУП К ЯДРУ СИСТЕМЫ...', '> ВВЕДИТЕ ПЕРСОНАЛЬНЫЙ КОД'],
            4: ['> УРОВЕНЬ 4: ФИНАЛЬНАЯ АУТЕНТИФИКАЦИЯ', '> ПОДТВЕРЖДЕНИЕ ПОСТОЯННОГО ДОСТУПА...', '> ВВЕДИТЕ КОД ОБЯЗАТЕЛЬСТВ']
        };

        function initAudio() { 
            audioContext = new (window.AudioContext || window.webkitAudioContext)(); 
        }

        function playRhythmicMusic() {
            if (!musicEnabled || !audioContext) return;
            
            const bassFreqs = [110, 110, 130.81, 110, 146.83, 110, 164.81, 130.81];
            let bassIndex = 0;
            
            const chordFreqs = [
                [220, 277.18, 329.63],
                [196, 246.94, 293.66],
                [164.81, 207.65, 246.94],
                [146.83, 185, 220]
            ];
            let chordIndex = 0;
            
            musicGain = audioContext.createGain();
            musicGain.connect(audioContext.destination);
            musicGain.gain.value = musicVolume;
            
            drumInterval = setInterval(() => {
                const bassOsc = audioContext.createOscillator();
                const bassGain = audioContext.createGain();
                bassOsc.connect(bassGain);
                bassGain.connect(musicGain);
                
                bassOsc.frequency.value = bassFreqs[bassIndex % bassFreqs.length];
                bassOsc.type = 'sawtooth';
                bassGain.gain.setValueAtTime(0.2, audioContext.currentTime);
                bassGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                
                bassOsc.start(audioContext.currentTime);
                bassOsc.stop(audioContext.currentTime + 0.2);
                
                if (bassIndex % 2 === 0) {
                    const hatOsc = audioContext.createOscillator();
                    const hatGain = audioContext.createGain();
                    hatOsc.connect(hatGain);
                    hatGain.connect(musicGain);
                    
                    hatOsc.type = 'square';
                    hatOsc.frequency.value = 800 + Math.random() * 200;
                    hatGain.gain.setValueAtTime(0.05, audioContext.currentTime);
                    hatGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                    
                    hatOsc.start(audioContext.currentTime);
                    hatOsc.stop(audioContext.currentTime + 0.05);
                }
                
                if (bassIndex % 4 === 0) {
                    const chord = chordFreqs[chordIndex % chordFreqs.length];
                    chord.forEach((freq, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(musicGain);
                        
                        osc.type = i === 0 ? 'triangle' : 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.08, audioContext.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                        
                        osc.start(audioContext.currentTime);
                        osc.stop(audioContext.currentTime + 0.4);
                    });
                    chordIndex++;
                }
                
                bassIndex++;
            }, 250);
        }

        function stopMusic() {
            if (drumInterval) {
                clearInterval(drumInterval);
                drumInterval = null;
            }
            musicOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            musicOscillators = [];
        }

        function toggleMusic() {
            if (!audioContext) initAudio();
            musicEnabled = !musicEnabled;
            document.getElementById('musicBtn').textContent = musicEnabled ? '🎵 Music: ON' : '🎵 Music: OFF';
            if (musicEnabled) {
                playRhythmicMusic();
            } else {
                stopMusic();
            }
        }

        function setVolume(value) {
            musicVolume = value / 100 * 0.5;
            if (musicGain) musicGain.gain.value = musicVolume;
        }
        
        function playSound(freq, duration, type = 'sine') {
            if (!soundEnabled || !audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }

        function playSuccessSound() {
            if (!soundEnabled) return;
            [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playSound(f, 0.3), i * 150));
        }

        function playErrorSound() { if (soundEnabled) playSound(150, 0.5, 'sawtooth'); }
        function playClickSound() { if (soundEnabled) playSound(800, 0.1, 'square'); }
        function playHintSound() { if (soundEnabled) playSound(1200, 0.2, 'sine'); }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 Sound: ON' : '🔇 Sound: OFF';
        }

        const matrixCanvas = document.getElementById('matrixCanvas');
        const matrixCtx = matrixCanvas.getContext('2d');
        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = document.body.scrollHeight;
        
        const matrixChars = '01FLOWERHACKLOVE💐❤️цветылюбовь';
        const matrixDrops = Array(Math.floor(matrixCanvas.width / 14)).fill(1);

        function drawMatrix() {
            matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            matrixCtx.fillStyle = '#0f0';
            matrixCtx.font = '14px Courier New';
            
            matrixDrops.forEach((drop, i) => {
                matrixCtx.fillText(matrixChars[Math.floor(Math.random() * matrixChars.length)], i * 14, drop * 14);
                if (drop * 14 > matrixCanvas.height && Math.random() > 0.975) matrixDrops[i] = 0;
                matrixDrops[i]++;
            });
        }

        const heartCanvas = document.getElementById('heartCanvas');
        const heartCtx = heartCanvas.getContext('2d');
        heartCanvas.width = 600;
        heartCanvas.height = 600;
        
        const heartPoints = [];
        for (let i = 0; i < 2000; i++) {
            const t = Math.random() * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            heartPoints.push({ x: x * 15 + 300, y: y * 15 + 300 });
        }

        function drawHeartMatrix() {
            heartCtx.clearRect(0, 0, heartCanvas.width, heartCanvas.height);
            heartCtx.fillStyle = '#ff69b4';
            heartCtx.font = '16px Courier New';
            
            heartPoints.forEach(point => {
                if (Math.random() > 0.5) {
                    const chars = '💐🌸❤️цветылюбовьflowerslove';
                    heartCtx.fillText(chars[Math.floor(Math.random() * chars.length)], point.x, point.y);
                }
            });
        }

        function createFlower() {
            const flower = document.getElementById('flower');
            flower.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.setProperty('--rotation', `${i * 45}deg`);
                petal.style.animationDelay = `${i * 0.2}s`;
                petal.style.top = `${50 - Math.cos(i * 45 * Math.PI / 180) * 30}%`;
                petal.style.left = `${50 - Math.sin(i * 45 * Math.PI / 180) * 30}%`;
                flower.appendChild(petal);
            }
            const center = document.createElement('div');
            center.className = 'flower-center';
            flower.appendChild(center);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const secs = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
                if (timeLeft <= 0) abortHack();
            }, 1000);
        }

        function addMessage(text, type = 'info') {
            const output = document.getElementById('terminalOutput');
            const msg = document.createElement('p');
            msg.className = `message ${type}`;
            msg.textContent = text;
            output.appendChild(msg);
            output.scrollTop = output.scrollHeight;
        }

        function updateProgress() {
            const pct = Math.round((currentLevel / totalLevels) * 100);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = pct + '%';
        }

        function updateLevelIndicators() {
            document.querySelectorAll('.level-dot').forEach((dot, i) => {
                dot.className = 'level-dot' + (i + 1 < currentLevel ? ' completed' : i + 1 === currentLevel ? ' active' : '');
            });
        }

        function showHint() {
            playHintSound();
            const hintIndex = Math.min(hintsUsed, hints[currentLevel].length - 1);
            addMessage(hints[currentLevel][hintIndex], 'hint');
            hintsUsed++;
            timeLeft -= 15;
        }

        function attemptDecrypt() {
            playClickSound();
            const input = document.getElementById('passwordInput');
            const password = input.value.trim().toLowerCase();
            
            if (!password) {
                addMessage('> ОШИБКА: Введите пароль', 'error');
                playErrorSound();
                return;
            }

            const isValid = passwords[currentLevel].some(p => 
                p.toLowerCase().includes(password) || password.includes(p.toLowerCase())
            );

            if (isValid) {
                playSuccessSound();
                addMessage(`> УРОВЕНЬ ${currentLevel} ЗАВЕРШЁН!`, 'success');
                addMessage('> ПЕРЕХОД К СЛЕДУЮЩЕМУ УРОВНЮ...', 'info');
                
                currentLevel++;
                hintsUsed = 0;
                input.value = '';
                updateProgress();
                updateLevelIndicators();

                if (currentLevel > totalLevels) {
                    completeHack();
                } else {
                    levelMessages[currentLevel].forEach(msg => setTimeout(() => addMessage(msg, 'info'), 500));
                }
            } else {
                playErrorSound();
                addMessage('> ДОСТУП ЗАПРЕЩЁН - Неверный пароль', 'error');
                addMessage('> Попробуйте снова или используйте подсказку', 'error');
                timeLeft -= 30;
            }
        }

        function completeHack() {
            hackComplete = true;
            clearInterval(timerInterval);
            stopMusic();
            playSuccessSound();
            
            // Select random romantic message
            const randomMessage = romanticMessages[Math.floor(Math.random() * romanticMessages.length)];
            document.getElementById('loveText').textContent = randomMessage.main;
            document.getElementById('secretMessage').innerHTML = randomMessage.secret;
            
            document.getElementById('flowerContainer').style.display = 'block';
            createFlower();
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'block';
                playSuccessSound();
            }, 1500);
        }

        function abortHack() {
            clearInterval(timerInterval);
            stopMusic();
            addMessage('> ВЗЛОМ ПРЕРВАН', 'error');
            playErrorSound();
            setTimeout(() => { alert('Взлом прерван! Попробовать снова?'); location.reload(); }, 500);
        }

        function restartHack() { location.reload(); }

        document.getElementById('passwordInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') attemptDecrypt();
        });

        window.addEventListener('load', () => {
            startTimer();
            setInterval(drawMatrix, 50);
            setInterval(drawHeartMatrix, 100);
            setTimeout(() => levelMessages[1].forEach(msg => addMessage(msg, 'info')), 1000);
        });

        window.addEventListener('resize', () => {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = document.body.scrollHeight;
        });
    </script>
</body>
</html>
